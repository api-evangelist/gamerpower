aid: gamerpower
name: GamerPower
description: >-
  GamerPower is a free, no-authentication REST API that aggregates live game giveaways across PC, console, mobile, VR,
  and DRM-free platforms — tracking free games, beta keys, DLC drops, and in-game loot offers from Steam, Epic Games
  Store, GOG, Ubisoft Connect, EA Origin, itch.io, Battle.net, PlayStation, Xbox, Switch, Android, iOS, and VR
  storefronts. Multi-value platform/type filtering, date/value/popularity sorting, and aggregate USD worth estimation
  are exposed.
