features:
  - name: No Authentication
    description: Fully open API; no key, token, or login required to consume any endpoint.
  - name: 18 Gaming Platforms
    description: >-
      Coverage of PC, Steam, Epic Games Store, GOG, Ubisoft, Origin, Battle.net, itch.io, PS4, PS5, Xbox One, Xbox
      Series X|S, Xbox 360, Switch, Android, iOS, VR, and DRM-Free.
  - name: Multi-Value Filtering
    description: >-
      The /filter endpoint accepts dot-separated platform and type lists for combined queries like "Epic Games OR Steam"
      and "Game OR Loot".
  - name: Sort By Date / Value / Popularity
    description: Built-in sort-by query parameter on /giveaways and /filter.
  - name: Worth Aggregation
    description: >-
      The /worth endpoint returns a live count and total USD value of the active giveaway pool — useful for marketing
      and trend dashboards.
  - name: Free For Personal And Commercial Use
    description: Attribution to GamerPower.com is the only requirement.
useCases:
  - name: Discord / Telegram Free-Game Bots
    description: Push notifications when new giveaways match a watched platform or type.
  - name: Free-Game RSS / Newsletter Pipelines
    description: Schedule daily fetches of live giveaways and email subscribers digestible summaries.
  - name: Gaming Companion Apps
    description: Embed live free-game listings inside mobile or web gaming companions.
  - name: Marketing And Trend Dashboards
    description: Track aggregate USD worth of live free-game promotions over time.
  - name: API Workshops And Tutorials
    description: Use as a zero-friction, no-auth example API when teaching REST consumption, MCP, or API mocking.
integrations:
  - name: RapidAPI
    description: Third-party marketplace listing exposes the same surface with managed keys, CORS, and tiered limits.
  - name: Naftiko
    description: REST + MCP capability adapters published for Giveaways, Filter, and Worth surfaces.
  - name: Microcks
    description: OpenAPI ships with x-microcks-operation extensions and named default examples for direct mock import.
  - name: Spectral
    description: A repo-local Spectral ruleset enforces GamerPower path, summary, parameter, schema, and method conventions.
maintainers:
